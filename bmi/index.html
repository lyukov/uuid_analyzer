<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор ИМТ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
    }

    .container {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 360px;
      text-align: center;
      margin-bottom: 20px;
    }

    h1 { font-size: 22px; margin-bottom: 20px; }

    input {
      width: 100%;
      padding-top: 16px;
      padding-bottom: 16px;
      padding-left: 10px;
      margin-bottom: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
    }

    canvas {
      width: 100%;
      max-width: 700px;
      max-height: 700px;
      background: #111827;
      border-radius: 16px;
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Калькулятор ИМТ</h1>
  <input id="weight" type="number" placeholder="Вес (кг)">
  <input id="height" type="number" placeholder="Рост (см)">
  <button onclick="calculateBMI()">Рассчитать</button>
  <div id="result"></div>
  <div id="category"></div>
</div>

<canvas id="chart"></canvas>

<script>
let chart;

function generateData(bmi) {
  const data = [];
  for (let h = 140; h <= 200; h += 2) {
    const hm = h / 100;
    data.push({ x: h, y: bmi * hm * hm });
  }
  return data;
}

function generateConstantData(value) {
  const data = [];
  for (let h = 140; h <= 200; h += 2) {
    data.push({ x: h, y: value });
  }
  return data;
}

function initChart() {
  const ctx = document.getElementById('chart').getContext('2d');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          data: generateData(18.5),
          fill: 'origin',
          backgroundColor: 'rgba(0,0,255,0.25)',
          borderWidth: 0,
          pointRadius: 0
        },
        {
          data: generateData(25),
          fill: '-1',
          backgroundColor: 'rgba(0,255,0,0.25)',
          borderWidth: 0,
          pointRadius: 0
        },
        {
          data: generateData(30),
          fill: '-1',
          backgroundColor: 'rgba(255,165,0,0.3)',
          borderWidth: 0,
          pointRadius: 0
        },
        {
          data: generateConstantData(125),
          fill: '-1',
          backgroundColor: 'rgba(255,0,0,0.25)',
          borderWidth: 0,
          pointRadius: 0
        },
        {
          label: 'Вы',
          data: [],
          type: 'scatter',
          pointRadius: 7,
          backgroundColor: 'white'
        }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'linear', title: { display: true, text: 'Рост (см)' } },
        y: { title: { display: true, text: 'Вес (кг)' } }
      }
    }
  });
}

function calculateBMI() {
  const w = parseFloat(document.getElementById('weight').value);
  const h = parseFloat(document.getElementById('height').value);
  if (!w || !h) return;

  const m = h/100;
  const bmi = w/(m*m);

  let cat = '';
  if (bmi < 18.5) cat = 'Дефицит';
  else if (bmi < 25) cat = 'Норма';
  else if (bmi < 30) cat = 'Выше нормы';
  else cat = 'Ожирение';

  document.getElementById('result').innerText = 'ИМТ: ' + bmi.toFixed(1);
  document.getElementById('category').innerText = cat;

  chart.data.datasets[4].data = [{ x: h, y: w }];
  chart.update();
}

initChart();
</script>

</body>
</html>
