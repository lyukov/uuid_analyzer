<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Image Color Picker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 20px;
    }

    canvas {
      border: 1px solid #334155;
      cursor: crosshair;
      max-width: 100%;
    }

    .colors {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 20px 0;
    }

    .color-box {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      border: 2px solid #fff;
    }

    .loupe {
      position: absolute;
      pointer-events: none;
      border: 2px solid white;
      border-radius: 50%;
      overflow: hidden;
      width: 120px;
      height: 120px;
      display: none;
      background: #000;
    }
  </style>
</head>
<body>

<h1>Выбор цвета</h1>
<input type="file" id="upload"><br><br>

<div style="position: relative; display: inline-block;">
  <canvas id="canvas"></canvas>
  <canvas id="loupeCanvas" class="loupe"></canvas>
</div>

<div class="colors">
  <div>
    <div class="color-box" id="colorBox"></div>
    <div>Выбранный</div>
  </div>
  <div>
    <div class="color-box" id="pantoneBox"></div>
    <div>Pantone</div>
  </div>
</div>

<div>
  RGB: <span id="rgb">-</span><br>
  HEX: <span id="hex">-</span><br>
  Pantone: <span id="pantone">-</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const loupeCanvas = document.getElementById('loupeCanvas');
const loupeCtx = loupeCanvas.getContext('2d');

const upload = document.getElementById('upload');

const rgbText = document.getElementById('rgb');
const hexText = document.getElementById('hex');
const pantoneText = document.getElementById('pantone');

const colorBox = document.getElementById('colorBox');
const pantoneBox = document.getElementById('pantoneBox');

let img = new Image();

// === НАСТРОЙКИ ЛУПЫ ===
const ZOOM = 6;
const SIZE = 20;

// 🔥 ВАЖНО: синхронизация реального размера canvas
loupeCanvas.width = SIZE * ZOOM;
loupeCanvas.height = SIZE * ZOOM;

upload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = (ev) => {
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = ev.target.result;
  };

  reader.readAsDataURL(file);
});

// === ЛУПА ===
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();

  const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

  loupeCanvas.style.display = 'block';
  loupeCanvas.style.left = (e.clientX - rect.left + 20) + 'px';
  loupeCanvas.style.top = (e.clientY - rect.top + 20) + 'px';

  const sx = x - SIZE / 2;
  const sy = y - SIZE / 2;

  loupeCtx.imageSmoothingEnabled = false;
  loupeCtx.clearRect(0, 0, loupeCanvas.width, loupeCanvas.height);

  loupeCtx.drawImage(
    canvas,
    sx, sy, SIZE, SIZE,
    0, 0, loupeCanvas.width, loupeCanvas.height
  );

  // === КРЕСТИК ===
  loupeCtx.strokeStyle = 'red';
  loupeCtx.lineWidth = 1;

  const center = loupeCanvas.width / 2;

  loupeCtx.beginPath();
  loupeCtx.moveTo(center, 0);
  loupeCtx.lineTo(center, loupeCanvas.height);
  loupeCtx.stroke();

  loupeCtx.beginPath();
  loupeCtx.moveTo(0, center);
  loupeCtx.lineTo(loupeCanvas.width, center);
  loupeCtx.stroke();
});

canvas.addEventListener('mouseleave', () => {
  loupeCanvas.style.display = 'none';
});

// === ВЫБОР ЦВЕТА ===
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();

  const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

  const pixel = ctx.getImageData(x, y, 1, 1).data;

  const r = pixel[0];
  const g = pixel[1];
  const b = pixel[2];

  const rgb = `rgb(${r}, ${g}, ${b})`;
  const hex = rgbToHex(r, g, b);

  rgbText.textContent = rgb;
  hexText.textContent = hex;

  colorBox.style.background = rgb;

  const pantone = findClosestPantone(r, g, b);

  if (pantone) {
    pantoneText.textContent = pantone.name + ' (' + pantone.hex + ')';
    pantoneBox.style.background = pantone.hex;
  }
});

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(x => {
    const h = x.toString(16);
    return h.length === 1 ? '0'+h : h;
  }).join('');
}

// === PANTONE ===
let pantoneColors = [];

fetch('pantone.json')
  .then(res => res.json())
  .then(data => pantoneColors = data);

function hexToRgb(hex) {
  const num = parseInt(hex.slice(1), 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}

function findClosestPantone(r, g, b) {
  let best = null;
  let min = Infinity;

  pantoneColors.forEach(p => {
    const c = hexToRgb(p.hex);

    const d =
      (r - c.r) ** 2 +
      (g - c.g) ** 2 +
      (b - c.b) ** 2;

    if (d < min) {
      min = d;
      best = p;
    }
  });

  return best;
}
</script>

</body>
</html>
