<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Image Color Picker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 20px;
    }

    canvas {
      border: 1px solid #334155;
      cursor: crosshair;
      max-width: 100%;
      touch-action: none;
    }

    .hint {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
    }

    .colors {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 10px 0 10px;
    }

    .color-wrapper {
      cursor: pointer;
    }

    .color-box {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      border: 2px solid #fff;
      transition: transform 0.1s;
    }

    .color-wrapper:active .color-box {
      transform: scale(0.95);
    }

    .copied {
      font-size: 12px;
      margin-top: 6px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .copied.show {
      opacity: 1;
    }

    .loupe {
      position: absolute;
      pointer-events: none;
      border: 2px solid white;
      border-radius: 50%;
      overflow: hidden;
      width: 120px;
      height: 120px;
      display: none;
      background: #000;
    }
  </style>
</head>
<body>

<h2>Выбор цвета</h2>
<input type="file" id="upload"><br><br>

<div style="position: relative; display: inline-block;">
  <canvas id="canvas"></canvas>
  <canvas id="loupeCanvas" class="loupe"></canvas>
</div>

<div class="hint">Click to copy</div>

<div class="colors">
  <div class="color-wrapper" onclick="copyColor('selected')">
    <div class="color-box" id="colorBox"></div>
    <div>Выбранный</div>
    <div class="copied" id="copiedSelected">Copied!</div>
  </div>

  <div class="color-wrapper" onclick="copyColor('pantone')">
    <div class="color-box" id="pantoneBox"></div>
    <div>Похожий</div>
    <div class="copied" id="copiedPantone">Copied!</div>
  </div>
</div>

<div>
  RGB: <span id="rgb">-</span><br>
  HEX: <span id="hex">-</span><br>
  Похожий: <span id="pantone">-</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const loupeCanvas = document.getElementById('loupeCanvas');
const loupeCtx = loupeCanvas.getContext('2d');

const upload = document.getElementById('upload');

const rgbText = document.getElementById('rgb');
const hexText = document.getElementById('hex');
const pantoneText = document.getElementById('pantone');

const colorBox = document.getElementById('colorBox');
const pantoneBox = document.getElementById('pantoneBox');

let selectedHex = null;
let pantoneHex = null;

let img = new Image();

// === ЛУПА ===
const ZOOM = 6;
const SIZE = 20;

loupeCanvas.width = SIZE * ZOOM;
loupeCanvas.height = SIZE * ZOOM;

function getCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();

  return {
    x: Math.floor((clientX - rect.left) * (canvas.width / rect.width)),
    y: Math.floor((clientY - rect.top) * (canvas.height / rect.height)),
    screenX: clientX - rect.left,
    screenY: clientY - rect.top
  };
}

function updateLoupe(clientX, clientY) {
  const { x, y, screenX, screenY } = getCoords(clientX, clientY);

  loupeCanvas.style.display = 'block';
  loupeCanvas.style.left = (screenX + 20) + 'px';
  loupeCanvas.style.top = (screenY + 20) + 'px';

  const sx = x - SIZE / 2;
  const sy = y - SIZE / 2;

  loupeCtx.imageSmoothingEnabled = false;
  loupeCtx.clearRect(0, 0, loupeCanvas.width, loupeCanvas.height);

  loupeCtx.drawImage(
    canvas,
    sx, sy, SIZE, SIZE,
    0, 0, loupeCanvas.width, loupeCanvas.height
  );

  const center = loupeCanvas.width / 2;

  loupeCtx.strokeStyle = 'red';
  loupeCtx.beginPath();
  loupeCtx.moveTo(center, 0);
  loupeCtx.lineTo(center, loupeCanvas.height);
  loupeCtx.stroke();

  loupeCtx.beginPath();
  loupeCtx.moveTo(0, center);
  loupeCtx.lineTo(loupeCanvas.width, center);
  loupeCtx.stroke();
}

function pickColor(clientX, clientY) {
  const { x, y } = getCoords(clientX, clientY);

  const pixel = ctx.getImageData(x, y, 1, 1).data;

  const r = pixel[0];
  const g = pixel[1];
  const b = pixel[2];

  const rgb = `rgb(${r}, ${g}, ${b})`;
  const hex = rgbToHex(r, g, b);

  selectedHex = hex;

  rgbText.textContent = rgb;
  hexText.textContent = hex;
  colorBox.style.background = rgb;

  const pantone = findClosestTone(r, g, b);

  if (pantone) {
    pantoneText.textContent = pantone.name + ' (' + pantone.hex + ')';
    pantoneBox.style.background = pantone.hex;
    pantoneHex = pantone.hex;
  }
}

// === COPY ===
function copyColor(type) {
  let hex = type === 'selected' ? selectedHex : pantoneHex;
  if (!hex) return;

  try {
    navigator.clipboard.writeText(hex);
  } catch (err) {
    const textarea = document.createElement('textarea');
    textarea.value = hex;
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
  }

  const el = document.getElementById(
    type === 'selected' ? 'copiedSelected' : 'copiedPantone'
  );

  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

// === EVENTS ===
canvas.addEventListener('mousemove', e => updateLoupe(e.clientX, e.clientY));
canvas.addEventListener('click', e => pickColor(e.clientX, e.clientY));
canvas.addEventListener('mouseleave', () => loupeCanvas.style.display = 'none');

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateLoupe(t.clientX, t.clientY);
  pickColor(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateLoupe(t.clientX, t.clientY);
  pickColor(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  loupeCanvas.style.display = 'none';
});

// === IMAGE ===
upload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = (ev) => {
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = ev.target.result;
  };

  reader.readAsDataURL(file);
});

// === HELPERS ===
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(x => {
    const h = x.toString(16);
    return h.length === 1 ? '0'+h : h;
  }).join('');
}

let yandexColors = [];

fetch('yandex.json')
  .then(res => res.json())
  .then(data => yandexColors = data);

function hexToRgb(hex) {
  const num = parseInt(hex.slice(1), 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}

function findClosestTone(r, g, b) {
  let best = null;
  let min = Infinity;

  yandexColors.forEach(p => {
    const c = hexToRgb(p.hex);

    const d =
      (r - c.r) ** 2 +
      (g - c.g) ** 2 +
      (b - c.b) ** 2;

    if (d < min) {
      min = d;
      best = p;
    }
  });

  return best;
}
</script>

</body>
</html>
